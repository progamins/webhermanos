<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="cupcakeFrost" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A373"/>
      <stop offset="100%" stop-color="#C4847D"/>
    </linearGradient>
    <linearGradient id="cupcakeBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8A5550"/>
      <stop offset="100%" stop-color="#523531"/>
    </linearGradient>
  </defs>
  <!-- Cherry on top -->
  <circle cx="50" cy="18" r="7" fill="#EF4444"/>
  <circle cx="47" cy="16" r="2" fill="#FCA5A5" opacity="0.6"/>
  <!-- Frosting swirl -->
  <path d="M25 45 C25 28, 35 18, 50 18 C65 18, 75 28, 75 45 Z" fill="url(#cupcakeFrost)"/>
  <!-- Frosting drip details -->
  <path d="M28 42 C28 50, 32 52, 35 46 C38 52, 42 50, 42 44" fill="#D4A373" opacity="0.7"/>
  <path d="M58 44 C58 50, 62 53, 65 47 C68 53, 72 50, 72 44" fill="#D4A373" opacity="0.7"/>
  <!-- Sprinkles -->
  <rect x="35" y="28" width="4" height="2" rx="1" fill="#FBBF24" transform="rotate(-20 37 29)"/>
  <rect x="55" y="25" width="4" height="2" rx="1" fill="#34D399" transform="rotate(15 57 26)"/>
  <rect x="42" y="35" width="4" height="2" rx="1" fill="#60A5FA" transform="rotate(-10 44 36)"/>
  <rect x="60" y="35" width="4" height="2" rx="1" fill="#F472B6" transform="rotate(25 62 36)"/>
  <rect x="30" y="33" width="4" height="2" rx="1" fill="#A78BFA" transform="rotate(-30 32 34)"/>
  <!-- Cupcake base/liner -->
  <path d="M22 45 L78 45 L72 88 L28 88 Z" fill="url(#cupcakeBase)"/>
  <!-- Liner ridges -->
  <line x1="30" y1="48" x2="28" y2="85" stroke="#6D4440" stroke-width="1.5" opacity="0.5"/>
  <line x1="38" y1="47" x2="36" y2="87" stroke="#6D4440" stroke-width="1.5" opacity="0.5"/>
  <line x1="46" y1="47" x2="44" y2="88" stroke="#6D4440" stroke-width="1.5" opacity="0.5"/>
  <line x1="54" y1="47" x2="56" y2="88" stroke="#6D4440" stroke-width="1.5" opacity="0.5"/>
  <line x1="62" y1="47" x2="64" y2="87" stroke="#6D4440" stroke-width="1.5" opacity="0.5"/>
  <line x1="70" y1="48" x2="72" y2="85" stroke="#6D4440" stroke-width="1.5" opacity="0.5"/>
</svg>
