    <!-- Preload critical images from localStorage -->
    <link rel="preconnect" href="/" />
    <script>
      (function() {
        try {
          var keys = ['maison_hero_url', 'maison_logo_url', 'maison_favicon_url'];
          for (var i = 0; i < keys.length; i++) {
            var url = localStorage.getItem(keys[i]);
            if (url && url !== 'data:,' && url.length > 10) {
              var clean = url.split('?')[0];
              var link = document.createElement('link');
              link.rel = 'preload';
              link.as = 'image';
              link.href = clean;
              link.fetchPriority = 'high';
              document.head.appendChild(link);
              var img = new Image();
              img.fetchPriority = 'high';
              img.src = clean;
            }
          }
        } catch(e) {}
      })();
    </script>

    <!-- DNS prefetch -->
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
